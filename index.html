<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Бонус до 130% для игроков Казахстана</title>
<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
  color: white;
  text-align: center;
}
.container {
  padding: 40px 20px;
}
h1 {
  font-size: 28px;
}
.bonus {
  font-size: 22px;
  margin: 20px 0;
  color: #00ffcc;
}
button {
  background: #ffcc00;
  border: none;
  padding: 15px 30px;
  font-size: 18px;
  border-radius: 8px;
  cursor: pointer;
  margin-top: 20px;
}
button:hover {
  background: #ffaa00;
}
.timer {
  font-size: 20px;
  margin-top: 15px;
  color: #ff4444;
}
.small {
  font-size: 12px;
  margin-top: 30px;
  opacity: 0.7;
}
</style>
</head>
<body>

<div class="container">
  <h1>Специальное предложение для игроков из Казахстана 🇰🇿</h1>
  
  <div class="bonus">
    Получите до 130% бонуса на первый депозит
  </div>

  <div class="timer" id="countdown">
    Предложение активно: 02:00
  </div>

  <a href="ВСТАВЬ_ТУТ_СВОЮ_ПАРТНЕРСКУЮ_ССЫЛКУ" target="_blank">
    <button>Получить бонус</button>
  </a>

  <div class="small">
    18+ | Условия действуют для новых пользователей
  </div>
</div>

<script>
let time = 120;
let countdown = document.getElementById("countdown");

let timer = setInterval(function() {
  let minutes = Math.floor(time / 60);
  let seconds = time % 60;
  seconds = seconds < 10 ? "0" + seconds : seconds;
  countdown.innerHTML = "Предложение активно: " + minutes + ":" + seconds;
  time--;
  if (time < 0) {
    clearInterval(timer);
  }
}, 1000);
</script>

</body>
</html>
